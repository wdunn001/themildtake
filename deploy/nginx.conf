# nginx config for themildtake (Astro static).
# Listens on :80 inside the container; jwilder nginx-proxy + letsencrypt
# companion handle TLS termination on the host.

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;

  # Hashed assets -> immutable. Astro emits content-hashed filenames in /_astro/.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
    try_files $uri =404;
  }

  # Runtime-fetched ratings data. The client fetches MessagePack (.msgpack);
  # brotli_static/gzip_static serve the precompressed .msgpack.br / .msgpack.gz
  # and set Content-Encoding: br|gzip + Vary automatically, so the browser
  # decompresses transparently and dataClient decodes the raw bytes. brotli is
  # preferred when the client advertises it (Accept-Encoding: br), else gzip,
  # else the raw .msgpack. The ngx_brotli modules are loaded in nginx.main.conf
  # (built in the Dockerfile). Always revalidate so a re-synced + redeployed
  # dataset is picked up immediately.
  location /data/ {
    types {
      application/msgpack msgpack;
      application/json     json;
    }
    default_type application/octet-stream;
    brotli_static on;
    gzip_static on;
    add_header Cache-Control "public, max-age=0, must-revalidate";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # Other static assets (favicon, logo, og image) -> 1 day.
  location ~* \.(svg|png|jpg|jpeg|gif|webp|avif|ico|woff2|woff|ttf|otf)$ {
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  # HTML -> always revalidate (so deploys are picked up immediately).
  location / {
    add_header Cache-Control "public, max-age=0, must-revalidate";
    # Astro generates true static .html files -- no SPA fallback needed.
    try_files $uri $uri/ $uri.html =404;
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header X-Frame-Options "DENY" always;

  server_tokens off;

  location = /favicon.ico { access_log off; log_not_found off; try_files $uri =404; }
  location = /robots.txt  { access_log off; log_not_found off; try_files $uri =404; }
}
