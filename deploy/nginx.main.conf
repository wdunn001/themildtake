# Main nginx context for The Mild Take. Loads the ngx_brotli dynamic modules
# (built in the Dockerfile brotli stage) - load_module MUST be in the main
# context, not a server/location block - then includes the server config from
# conf.d/default.conf (deploy/nginx.conf).

load_module /etc/nginx/modules/ngx_http_brotli_filter_module.so;
load_module /etc/nginx/modules/ngx_http_brotli_static_module.so;

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout 65;

  # Brotli on-the-fly for text assets that aren't precompressed (HTML, the
  # hashed /_astro JS/CSS). Precompressed .br (the /data MessagePack) is served
  # by brotli_static in the server block. Both set Content-Encoding: br + Vary
  # automatically, so the browser decompresses transparently.
  brotli on;
  brotli_comp_level 6;
  brotli_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/msgpack
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;

  include /etc/nginx/conf.d/*.conf;
}
