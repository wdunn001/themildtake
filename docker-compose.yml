# themildtake -- joins the existing jwilder/nginx-proxy network on the .198 host.
# The proxy + letsencrypt-companion (running outside this compose) auto-route
# the configured hostname to this container and provision the TLS cert.

services:
  themildtake:
    container_name: themildtake
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Public origin baked into canonical URLs / JSON-LD / sitemap.
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://themildtake.com}
    image: themildtake:latest
    restart: unless-stopped
    expose:
      - "80"
    environment:
      # jwilder/nginx-proxy auto-routes these hosts to this container; the
      # acme-companion provisions the TLS cert for LETSENCRYPT_HOST. DNS for each
      # host must resolve to the proxy host (192.168.1.198) BEFORE `compose up`,
      # or cert issuance fails. To also serve www, set
      # PROXY_THEMILDTAKE_HOSTS=themildtake.com,www.themildtake.com (and point www DNS).
      VIRTUAL_HOST: ${PROXY_THEMILDTAKE_HOSTS:-themildtake.com}
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: ${PROXY_THEMILDTAKE_HOSTS:-themildtake.com}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-wdunn001@gmail.com}
    networks:
      - nginx-proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  nginx-proxy:
    external: true
    name: ${NGINX_PROXY_NETWORK:-nginx-proxy}
