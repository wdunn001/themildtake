# themildtake -- joins the existing jwilder/nginx-proxy network on the .198 host.
# The proxy + letsencrypt-companion (running outside this compose) auto-route
# the configured hostname to this container and provision the TLS cert.

services:
  themildtake:
    container_name: themildtake
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Public origin baked into canonical URLs / JSON-LD / sitemap.
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://themildtake.example}
    image: themildtake:latest
    restart: unless-stopped
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: ${PROXY_THEMILDTAKE_HOSTS:-themildtake.example}
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: ${PROXY_THEMILDTAKE_HOSTS:-themildtake.example}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-admin@themildtake.example}
    networks:
      - nginx-proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  nginx-proxy:
    external: true
    name: ${NGINX_PROXY_NETWORK:-nginx-proxy}
